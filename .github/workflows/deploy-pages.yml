name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phone-shop/package-lock.json

      - name: Install phone-shop dependencies
        run: npm ci
        working-directory: phone-shop

      - name: Build phone-shop
        run: npm run build -- --base=/${{ github.event.repository.name }}/phone-shop/
        working-directory: phone-shop

      - name: Assemble site
        run: |
          mkdir -p site
          cp index.html style.css site/
          cp -r phone-shop/dist site/phone-shop
          cp site/phone-shop/index.html site/phone-shop/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
